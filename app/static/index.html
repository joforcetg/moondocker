<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Moonseek</title>
  <link rel="preload" href="/static/fonts/ebgaramond-regular.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="/static/fonts/unifrakturcook-bold.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="/static/fonts/noto-sans-runic-runic-400-normal.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preconnect" href="https://upload.wikimedia.org" crossorigin>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div id="app">
    <header class="topbar">
      <span class="wordmark">Moonseek</span>
      <span id="coords" class="coords"></span>
    </header>

    <p id="status" role="status" aria-live="polite">locating…</p>

    <div id="panels">
      <section class="panel panel-moon">
        <p class="panel-rune" aria-hidden="true">ᛗᛟᛟᚾ</p>
        <header class="panel-hdr">Moon</header>
        <div id="moon">
          <div class="skeleton sk-circle"></div>
          <div class="skeleton sk-line sk-w60"></div>
          <div class="skeleton sk-line sk-w80"></div>
          <div class="skeleton sk-line sk-w40"></div>
        </div>
      </section>
      <section class="panel panel-sky">
        <p class="panel-rune" aria-hidden="true">ᚾᛁᚷᚺᛏ ᛋᚲᚤ</p>
        <header class="panel-hdr">Night Sky</header>
        <div id="skymap"><div class="skeleton sk-map"></div></div>
      </section>
      <section class="panel panel-const">
        <p class="panel-rune" aria-hidden="true">ᚲᛟᚾᛋᛏᛖᛚᛚᚨᛏᛁᛟᚾᛋ</p>
        <header class="panel-hdr">Constellations</header>
        <div id="constellations">
          <div class="skeleton sk-line sk-w80"></div>
          <div class="skeleton sk-line sk-w60"></div>
          <div class="skeleton sk-line sk-w80"></div>
          <div class="skeleton sk-line sk-w40"></div>
          <div class="skeleton sk-line sk-w60"></div>
        </div>
      </section>
      <section class="panel panel-legend">
        <p class="panel-rune" id="legend-rune" aria-hidden="true">ᛚᛖᚷᛖᚾᛞ</p>
        <header class="panel-hdr" id="legend-hdr">Legend</header>
        <div id="legend">
          <div class="skeleton sk-line sk-w60"></div>
          <div class="skeleton sk-line sk-w80"></div>
          <div class="skeleton sk-line sk-w80"></div>
          <div class="skeleton sk-line sk-w40"></div>
        </div>
      </section>
    </div>
  </div>
  <script src="/static/app.js" defer></script>
</body>
</html>
