services:
  moondocker:
    image: ghcr.io/joforcetg/moondocker:latest
    # build: .  # uncomment to build from source instead of pulling
    restart: unless-stopped
    ports:
      - "7432:7432"
    environment:
      LAT: ""   # optional fallback latitude; leave blank to use browser geolocation
      LON: ""   # optional fallback longitude
    mem_limit: 512m
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    # healthcheck defined in Dockerfile — no override here to keep a single source of truth
